name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 4320  # 72 heures max

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Activation RDP + désactivation NLA
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "MinEncryptionLevel" -Value 1 -Force

          # Nettoyage et règle firewall plus propre
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 remoteip=any
          
          Restart-Service -Name TermService -Force
          Write-Host "RDP configuré avec succès"

      - name: Create Strong RDP User
        run: |
          Add-Type -AssemblyName System.Security

          # Générateur de mot de passe ultra-fort (20 caractères)
          $chars = @(
              [char[]](65..90), [char[]](97..122), 
              [char[]](48..57), 
              [char[]](33..47 + 58..64 + 91..96 + 123..126)
          ) | ForEach-Object { $_ }

          $password = -join (1..20 | ForEach-Object { $chars | Get-Random })
          
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Suppression si l'utilisateur existe déjà
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP" -Force
          }
          
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          
          Write-Host "Utilisateur RDP créé avec succès"

      - name: Install Latest Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force
          Write-Host "Tailscale installé (dernière version)"

      - name: Connect Tailscale + Get IP
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-rdp-$env:GITHUB_RUN_ID `
            --advertise-tags=tag:github-runner `
            --reset
          
          # Attente + récupération IP
          $tsIP = $null
          for ($i = 0; $i -lt 15; $i++) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              if ($tsIP) { break }
              Start-Sleep -Seconds 4
          }
          
          if (-not $tsIP) {
              Write-Error "Impossible d'obtenir l'IP Tailscale"
              exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Connecté à Tailscale avec IP : $tsIP"

      - name: Final Credentials + Instructions
        run: |
          Write-Host "`n=== RDP ACCESS - READY ===" -ForegroundColor Green
          Write-Host "Address     : $env:TAILSCALE_IP`:3389" -ForegroundColor Cyan
          Write-Host "Username    : $env:RDP_USER" -ForegroundColor Cyan
          Write-Host "Password    : $env:RDP_PASSWORD" -ForegroundColor Cyan
          Write-Host "=================================`n"
          
          # Sauvegarde sécurisée des credentials dans un artifact (optionnel)
          "RDP User: $env:RDP_USER`nPassword: $env:RDP_PASSWORD`nIP: $env:TAILSCALE_IP" | Out-File -FilePath "rdp-credentials.txt" -Encoding UTF8

      - name: Upload Credentials (Secure)
        uses: actions/upload-artifact@v4
        with:
          name: rdp-credentials
          path: rdp-credentials.txt
          retention-days: 7

      - name: Keep Alive + Auto Cleanup
        run: |
          Write-Host "RDP actif via Tailscale. Le runner restera en ligne jusqu'à annulation manuelle."
          
          # Nettoyage automatique à la fin du workflow
          try {
              while ($true) {
                  Write-Host "[$(Get-Date)] Session RDP active - IP: $env:TAILSCALE_IP"
                  Start-Sleep -Seconds 180
              }
          } finally {
              # Nettoyage propre à la fin
              & "$env:ProgramFiles\Tailscale\tailscale.exe" down 2>$null
              Remove-LocalUser -Name "RDP" -Force -ErrorAction SilentlyContinue
              Write-Host "Nettoyage terminé."
          } 
