name: RDP

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to install'
        required: false
        default: '3.12'
        type: choice
        options:
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      session-info: ${{ steps.display-creds.outputs.info }}

    steps:
      - name: Set Session Configuration
        shell: pwsh
        run: |
          $sessionDuration = 300  # 5 hours
          $maxGithubLimit = 360   # 6 hours max
          $margin = $maxGithubLimit - $sessionDuration
          
          Add-Content -Path $env:GITHUB_ENV -Value "SESSION_DURATION=$sessionDuration"
          Add-Content -Path $env:GITHUB_ENV -Value "MAX_GITHUB_LIMIT=$maxGithubLimit"
          Add-Content -Path $env:GITHUB_ENV -Value "MARGIN=$margin"
          
          Write-Host "⏱️  Session Duration: $sessionDuration minutes (5h)" -ForegroundColor Cyan
          Write-Host "⏱️  Max GitHub Actions limit: $maxGithubLimit minutes (6h)" -ForegroundColor Cyan
          Write-Host "✅ Margin de sécurité: $margin minutes" -ForegroundColor Green

      - name: Configure Core RDP Settings
        shell: pwsh
        run: |
          try {
              Write-Host "🔧 Configuring RDP Settings..." -ForegroundColor Cyan
              
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                               -Name "fDenyTSConnections" -Value 0 -Force
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                               -Name "UserAuthentication" -Value 1 -Force
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                               -Name "SecurityLayer" -Value 2 -Force
              
              netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
              netsh advfirewall firewall add rule name="RDP-Tailscale" `
                dir=in action=allow protocol=TCP localport=3389 >$null 2>&1
              
              netsh advfirewall firewall delete rule name="SSH-Server" 2>$null
              netsh advfirewall firewall add rule name="SSH-Server" `
                dir=in action=allow protocol=TCP localport=22 >$null 2>&1
              
              Restart-Service -Name TermService -Force
              Start-Sleep -Seconds 5
              Write-Host "✅ RDP configuration completed successfully" -ForegroundColor Green
          } catch {
              Write-Error "❌ RDP configuration failed: $_"
              exit 1
          }

      - name: Create RDP User with Secure Password
        shell: pwsh
        run: |
          try {
              Write-Host "🔑 Creating RDP User..." -ForegroundColor Cyan
              
              $charSet = @{
                  Upper   = [char[]](65..90)
                  Lower   = [char[]](97..122)
                  Number  = [char[]](48..57)
                  Special = @('@', '#', '$', '%', '&', '*', '+', '-', '=', '!', '?')
              }

              $rawPassword = @()
              $rawPassword += $charSet.Upper | Get-Random -Count 4
              $rawPassword += $charSet.Lower | Get-Random -Count 4
              $rawPassword += $charSet.Number | Get-Random -Count 4
              $rawPassword += $charSet.Special | Get-Random -Count 4
              $password = -join ($rawPassword | Sort-Object { Get-Random })

              $securePass = ConvertTo-SecureString $password -AsPlainText -Force
              $userName = "RDP"

              if (Get-LocalUser -Name $userName -ErrorAction SilentlyContinue) {
                  Write-Host "⚠️  User RDP already exists. Updating password..." -ForegroundColor Yellow
                  Set-LocalUser -Name $userName -Password $securePass
              } else {
                  New-LocalUser -Name $userName -Password $securePass -PasswordNeverExpires -ErrorAction Stop
                  Add-LocalGroupMember -Group "Administrators" -Member $userName
                  Add-LocalGroupMember -Group "Remote Desktop Users" -Member $userName
              }
              
              Add-Content -Path $env:GITHUB_ENV -Value "RDP_PASSWORD=$password"
              Write-Host "✅ RDP user created/updated successfully" -ForegroundColor Green
          } catch {
              Write-Error "❌ User creation failed: $_"
              exit 1
          }

      - name: Install Python
        shell: pwsh
        run: |
          try {
              $pythonVersion = "${{ github.event.inputs.python_version }}"
              Write-Host "🐍 Installing Python $pythonVersion..." -ForegroundColor Cyan
              
              $pythonUrl = "https://www.python.org/ftp/python/"
              
              $versionMap = @{
                  "3.9"  = "3.9.19"
                  "3.10" = "3.10.14"
                  "3.11" = "3.11.9"
                  "3.12" = "3.12.3"
              }
              
              $fullVersion = $versionMap[$pythonVersion]
              if (-not $fullVersion) {
                  Write-Error "Python version $pythonVersion not found in version map"
                  exit 1
              }
              
              $installerUrl = "${pythonUrl}${fullVersion}/python-${fullVersion}-amd64.exe"
              $installerPath = "$env:TEMP\python-installer.exe"

              Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -ErrorAction Stop
              Start-Process $installerPath -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0" -Wait -NoNewWindow
              Remove-Item $installerPath -Force

              # Verify installation
              $pythonCheck = & python --version 2>&1
              $pipCheck = & pip --version 2>&1
              
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "✅ Python $pythonVersion installed successfully" -ForegroundColor Green
                  Write-Host "   $pythonCheck" -ForegroundColor Gray
                  Write-Host "   $pipCheck" -ForegroundColor Gray
              } else {
                  throw "Python installation verification failed"
              }
          } catch {
              Write-Error "❌ Python installation failed: $_"
              exit 1
          }

      - name: Install and Configure OpenSSH
        shell: pwsh
        run: |
          try {
              Write-Host "🔐 Installing OpenSSH..." -ForegroundColor Cyan
              
              $sshService = Get-Service -Name sshd -ErrorAction SilentlyContinue
              if (-not $sshService) {
                  Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 | Out-Null
              }

              Start-Service sshd -ErrorAction SilentlyContinue
              Set-Service -Name sshd -StartupType Automatic

              Write-Host "✅ OpenSSH configured successfully" -ForegroundColor Green
          } catch {
              Write-Warning "⚠️  OpenSSH setup skipped: $_"
          }

      - name: Install Tailscale
        shell: pwsh
        run: |
          try {
              Write-Host "🔗 Installing Tailscale..." -ForegroundColor Cyan
              
              $maxRetries = 5
              $retryCount = 0
              $downloadUrl = $null
              
              # Strategy 1: Try GitHub releases API
              while ($retryCount -lt $maxRetries -and -not $downloadUrl) {
                  try {
                      Write-Host "   Attempt $($retryCount + 1)/$maxRetries - Fetching latest release..." -ForegroundColor Gray
                      
                      $releaseUrl = "https://api.github.com/repos/tailscale/tailscale/releases/latest"
                      
                      $headers = @{
                          'Accept' = 'application/vnd.github.v3+json'
                          'User-Agent' = 'GitHub-Actions'
                      }
                      
                      if ($env:GITHUB_TOKEN) {
                          $headers['Authorization'] = "token $($env:GITHUB_TOKEN)"
                      }
                      
                      $response = Invoke-RestMethod -Uri $releaseUrl -Headers $headers -ErrorAction Stop -TimeoutSec 10
                      
                      if ($response -and $response.assets) {
                          Write-Host "   Found $($response.assets.count) assets" -ForegroundColor Gray
                          
                          # Find Windows AMD64 MSI
                          $downloadUrl = $response.assets | Where-Object { 
                              $_.name -match "windows-amd64.*\.msi$" -or $_.name -match "tailscale-setup.*\.msi$"
                          } | Select-Object -First 1 | ForEach-Object { $_.browser_download_url }
                      }
                      
                      if ($downloadUrl) {
                          Write-Host "   ✓ Found download URL" -ForegroundColor Green
                          break
                      }
                  } catch {
                      $retryCount++
                      Write-Host "   ✗ Attempt $retryCount failed: $_" -ForegroundColor Yellow
                      
                      if ($retryCount -lt $maxRetries) {
                          Start-Sleep -Seconds 15
                      }
                  }
              }
              
              # Strategy 2: Fallback to CDN
              if (-not $downloadUrl) {
                  Write-Host "   Fallback: Trying Tailscale CDN..." -ForegroundColor Yellow
                  $downloadUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.msi"
              }
              
              Write-Host "   Downloading: $downloadUrl" -ForegroundColor Cyan
              $installerPath = "$env:TEMP\tailscale.msi"
              
              Invoke-WebRequest -Uri $downloadUrl -OutFile $installerPath -ErrorAction Stop -TimeoutSec 30
              
              if (-not (Test-Path $installerPath)) {
                  throw "Installer file not created"
              }
              
              $fileSize = (Get-Item $installerPath).Length / 1MB
              Write-Host "   Downloaded: $([math]::Round($fileSize, 2)) MB" -ForegroundColor Green
              
              Write-Host "   Installing..." -ForegroundColor Cyan
              $installProcess = Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait -NoNewWindow -PassThru
              
              if ($installProcess.ExitCode -ne 0) {
                  throw "MSI installation failed with exit code $($installProcess.ExitCode)"
              }
              
              Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
              
              # Verify
              Start-Sleep -Seconds 2
              $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
              
              if (-not (Test-Path $tailscalePath)) {
                  throw "Tailscale executable not found after installation"
              }
              
              Write-Host "✅ Tailscale installed successfully" -ForegroundColor Green
              
          } catch {
              Write-Error "❌ Failed to install Tailscale: $_"
              exit 1
          }

      - name: Establish Tailscale Connection
        shell: pwsh
        run: |
          try {
              $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
              
              if (-not (Test-Path $tailscalePath)) {
                  Write-Error "Tailscale executable not found"
                  exit 1
              }

              Write-Host "🔗 Connecting to Tailscale..." -ForegroundColor Cyan
              
              if (-not $env:TAILSCALE_AUTH_KEY) {
                  Write-Warning "⚠️  TAILSCALE_AUTH_KEY not configured"
                  Add-Content -Path $env:GITHUB_ENV -Value "TAILSCALE_IP=127.0.0.1"
                  exit 0
              }
              
              & $tailscalePath up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
                --hostname="gh-runner-$env:GITHUB_RUN_ID" --accept-dns=false 2>&1 | Write-Host
              
              $tsIP = $null
              $retries = 0
              
              while (-not $tsIP -and $retries -lt 30) {
                  Start-Sleep -Seconds 2
                  try {
                      $tsIP = & $tailscalePath ip -4 2>$null
                      if ($tsIP -and $tsIP.Trim()) { break }
                  } catch { }
                  
                  $retries++
                  if ($retries % 5 -eq 0) {
                      Write-Host "⏳ Waiting for IP... (attempt $retries/30)" -ForegroundColor Yellow
                  }
              }
              
              if (-not $tsIP -or -not $tsIP.Trim()) {
                  Write-Error "Tailscale IP not assigned"
                  exit 1
              }
              
              Add-Content -Path $env:GITHUB_ENV -Value "TAILSCALE_IP=$($tsIP.Trim())"
              Write-Host "✅ Tailscale IP: $($tsIP.Trim())" -ForegroundColor Green
          } catch {
              Write-Error "❌ Tailscale connection failed: $_"
              exit 1
          }

      - name: Verify RDP Accessibility
        shell: pwsh
        run: |
          try {
              $tsIP = $env:TAILSCALE_IP
              
              if (-not $tsIP) {
                  Write-Error "TAILSCALE_IP not set"
                  exit 1
              }

              Write-Host "🔍 Verifying RDP..." -ForegroundColor Cyan
              
              $testResult = Test-NetConnection -ComputerName $tsIP -Port 3389 -WarningAction SilentlyContinue
              
              if ($testResult.TcpTestSucceeded) {
                  Write-Host "✅ RDP port 3389 is accessible" -ForegroundColor Green
              } else {
                  Write-Host "⚠️  RDP port test inconclusive (continuing...)" -ForegroundColor Yellow
              }
          } catch {
              Write-Warning "⚠️  Verification skipped: $_"
          }

      - name: Display Connection Details
        id: display-creds
        shell: pwsh
        run: |
          $rdpPassword = $env:RDP_PASSWORD
          $tsIP = $env:TAILSCALE_IP
          $sessionDuration = $env:SESSION_DURATION
          $userName = "RDP"

          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║         🚀 RDP & SSH CONNECTION DETAILS 🚀             ║" -ForegroundColor Green
          Write-Host "╠════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║ 📍 SERVER: $tsIP" -ForegroundColor Yellow
          Write-Host "║ 👤 USERNAME: $userName" -ForegroundColor Yellow
          Write-Host "║ 🔑 PASSWORD: $rdpPassword" -ForegroundColor Yellow
          Write-Host "║ 🔌 PORT: 3389" -ForegroundColor Yellow
          Write-Host "║" -ForegroundColor Green
          Write-Host "║ ssh -o StrictHostKeyChecking=no RDP@$tsIP" -ForegroundColor Cyan
          Write-Host "║" -ForegroundColor Green
          Write-Host "║ ⏱️  SESSION: $sessionDuration min (5h)" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""

      - name: Health Check & Monitoring
        shell: pwsh
        run: |
          $sessionDuration = [int]$env:SESSION_DURATION
          $startTime = Get-Date
          $endTime = $startTime.AddMinutes($sessionDuration)

          while ((Get-Date) -lt $endTime) {
              $remaining = $endTime - (Get-Date)
              $elapsed = (Get-Date) - $startTime
              
              try {
                  $cpuUsage = (Get-WmiObject -Query "SELECT LoadPercentage FROM Win32_Processor" | Select-Object -First 1).LoadPercentage
                  $memUsage = ([math]::Round((Get-WmiObject -Class Win32_OperatingSystem).TotalVisibleMemorySize - (Get-WmiObject -Class Win32_OperatingSystem).FreePhysicalMemory) / 1024 / 1024, 2)
                  $memTotal = ([math]::Round((Get-WmiObject -Class Win32_OperatingSystem).TotalVisibleMemorySize / 1024 / 1024, 2))
              } catch {
                  $cpuUsage = "N/A"
                  $memUsage = "N/A"
                  $memTotal = "N/A"
              }
              
              try {
                  $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
                  if (Test-Path $tailscalePath) {
                      $tsStatus = & $tailscalePath status --self=true 2>$null
                      $isConnected = if ($tsStatus) { "✅ Connected" } else { "❌ Disconnected" }
                  } else {
                      $isConnected = "⚠️  Not Installed"
                  }
              } catch {
                  $isConnected = "⚠️  Error"
              }
              
              try {
                  $rdpRunning = Get-Service -Name TermService -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Status
                  $rdpStatus = if ($rdpRunning -eq "Running") { "✅ Running" } else { "⚠️  Stopped" }
              } catch {
                  $rdpStatus = "⚠️  Error"
              }
              
              try {
                  $sshRunning = Get-Service -Name sshd -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Status
                  $sshStatus = if ($sshRunning -eq "Running") { "✅ Running" } else { "⚠️  Stopped" }
              } catch {
                  $sshStatus = "⚠️  Error"
              }
              
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] ⏱️ $($elapsed.Minutes)m | 📊 CPU:$cpuUsage% RAM:$memUsage/$memTotal | 🔗$isConnected | 🖥️$rdpStatus | 🐚$sshStatus"
              
              Start-Sleep -Seconds 300  # 5 minutes
          }
          
          Write-Host ""
          Write-Host "⏰ Session completed. Cleaning up..." -ForegroundColor Yellow

      - name: Cleanup RDP User (always)
        if: always()
        shell: pwsh
        run: |
          try {
              if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
                  Remove-LocalUser -Name "RDP" -Force
                  Write-Host "✅ RDP user removed" -ForegroundColor Green
              }
          } catch {
              Write-Warning "⚠️  Cleanup: $_"
          }
